// ── Styles ────────────────────────────────────────────────────────────────────
const typeStyle = {
  Aptitude:       { bg:"#0f2040", text:"#93c5fd", border:"#1e4080", icon:"📐" },
  Coding:         { bg:"#240f38", text:"#d8b4fe", border:"#5b21b6", icon:"⚙" },
  Mock:           { bg:"#3b1f1f", text:"#fca5a5", border:"#7f1d1d", icon:"🎯" },
  Review:         { bg:"#2a2010", text:"#fcd34d", border:"#78350f", icon:"📋" },
};
const diffBadge = {
  "Easy":         { bg:"#0a2a0a", text:"#4ade80", border:"#14532d" },
  "Easy–Medium":  { bg:"#1a2a0a", text:"#a3e635", border:"#365314" },
  "Medium":       { bg:"#2a1a0a", text:"#fb923c", border:"#7c2d12" },
  "Medium–Hard":  { bg:"#2a0a1a", text:"#f472b6", border:"#831843" },
  "Hard":         { bg:"#3b0a0a", text:"#f87171", border:"#7f1d1d" },
  "Revision":     { bg:"#0a1a2a", text:"#38bdf8", border:"#0c4a6e" },
};

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [activeDay, setActiveDay]         = useState(0);
  const [completed, setCompleted]         = useState({});
  const [expanded, setExpanded]           = useState({});
  const [notes, setNotes]                 = useState({});
  const [noteText, setNoteText]           = useState("");
  const [view, setView]                   = useState("all");
  const [loading, setLoading]             = useState(true);
  const [saving, setSaving]               = useState(false);
  const [toast, setToast]                 = useState(null);
  const [showReset, setShowReset]         = useState(false);
  const noteTimer                         = useRef(null);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  // Load progress + notes on mount
  useEffect(() => {
    Promise.all([
      fetch(`${API}/progress`).then(r => r.json()),
      fetch(`${API}/notes`).then(r => r.json()),
    ]).then(([prog, nts]) => {
      setCompleted(prog);
      setNotes(nts);
      setLoading(false);
    }).catch(() => {
      setLoading(false);
      showToast("⚠ Could not connect to server — is it running?");
    });
  }, []);

  // Update note text when day changes
  useEffect(() => {
    setNoteText(notes[activeDay] || "");
  }, [activeDay, notes]);

  const toggleSession = async (di, si) => {
    const key = `${di}-${si}`;
    const newVal = !completed[key];
    setSaving(true);
    setCompleted(p => ({ ...p, [key]: newVal }));
    try {
      await fetch(`${API}/progress`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key, completed: newVal }),
      });
      showToast(newVal ? "✓ Session marked complete" : "Session unmarked");
    } catch {
      showToast("⚠ Save failed — check server");
    }
    setSaving(false);
  };

  const toggleProblems = (di, si) => {
    const k = `${di}-${si}`;
    setExpanded(p => ({ ...p, [k]: !p[k] }));
  };

  const saveNote = useCallback((text) => {
    fetch(`${API}/notes`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dayIndex: activeDay, content: text }),
    }).catch(() => {});
  }, [activeDay]);

  const handleNoteChange = (e) => {
    const text = e.target.value;
    setNoteText(text);
    setNotes(p => ({ ...p, [activeDay]: text }));
    clearTimeout(noteTimer.current);
    noteTimer.current = setTimeout(() => saveNote(text), 800);
  };

  const handleReset = async () => {
    await fetch(`${API}/progress/reset`, { method: "POST" });
    setCompleted({});
    setShowReset(false);
    showToast("Progress reset to zero");
  };

  // Stats
  const totalSessions  = days.reduce((a, d) => a + d.sessions.length, 0);
  const doneCount      = Object.values(completed).filter(Boolean).length;
  const codingSessions = days.reduce((a, d) => a + d.sessions.filter(s => s.coding).length, 0);
  const codingDone     = days.reduce((a, d, di) => a + d.sessions.filter((s, si) => s.coding && completed[`${di}-${si}`]).length, 0);
  const overallPct     = Math.round((doneCount / totalSessions) * 100) || 0;
  const codingPct      = Math.round((codingDone / codingSessions) * 100) || 0;

  const day = days[activeDay];
  const filteredSessions = day.sessions.filter(s => {
    if (view === "coding")   return s.coding || s.type === "Coding";
    if (view === "aptitude") return s.type === "Aptitude";
    return true;
  });

  if (loading) return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <div style={{ width:32, height:32, border:"3px solid #1e2d45", borderTopColor:"#6366f1", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
      <div style={{ fontSize:12, color:"#3d4f6e", letterSpacing:"0.2em" }}>LOADING FROM DATABASE...</div>
    </div>
  );

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", overflow:"hidden" }}>
      {/* Toast */}
      {toast && <div className="toast">{toast}</div>}

      {/* Reset confirm */}
      {showReset && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"#0f1525", border:"1px solid #7f1d1d", borderRadius:10, padding:28, maxWidth:360, textAlign:"center" }}>
            <div style={{ fontSize:14, color:"#f87171", fontFamily:"sans-serif", marginBottom:12, fontWeight:700 }}>Reset all progress?</div>
            <div style={{ fontSize:11, color:"#64748b", fontFamily:"sans-serif", marginBottom:20, lineHeight:1.6 }}>This will clear all completed sessions from the database. Your notes will be kept.</div>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button onClick={handleReset} style={{ padding:"8px 20px", background:"#7f1d1d", border:"1px solid #ef4444", color:"#fca5a5", borderRadius:5, cursor:"pointer", fontSize:11, fontFamily:"monospace" }}>YES, RESET</button>
              <button onClick={() => setShowReset(false)} style={{ padding:"8px 20px", background:"#0a1020", border:"1px solid #1e2d45", color:"#64748b", borderRadius:5, cursor:"pointer", fontSize:11, fontFamily:"monospace" }}>CANCEL</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#080918 0%,#0f0a24 50%,#080918 100%)", borderBottom:"2px solid #1a2235", padding:"14px 20px 11px", flexShrink:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
          <div>
            <div style={{ fontSize:8, letterSpacing:"0.35em", color:"#6366f1", marginBottom:3, fontWeight:800 }}>
              TCS NQT 2026 · 7-DAY TRACKER · LOCAL + PERSISTENT
              {saving && <span style={{ marginLeft:12, color:"#fbbf24" }}>⟳ SAVING...</span>}
            </div>
            <h1 style={{ margin:"0 0 3px", fontSize:"clamp(13px,2.5vw,20px)", fontWeight:900, color:"#f8fafc", letterSpacing:"-0.02em", lineHeight:1.15 }}>
              FULL SYLLABUS · DAILY CODING · GITHUB PYQs
            </h1>
            <div style={{ fontSize:9, color:"#3d4f6e", fontFamily:"sans-serif" }}>
              Progress saved to <code style={{ color:"#6366f1", fontSize:9 }}>progress.db</code> · Restored every session · Mar 14–20, 2026
            </div>
          </div>
          <div style={{ display:"flex", gap:14, alignItems:"flex-start", flexShrink:0 }}>
            {[
              { label:"OVERALL", pct:overallPct, sub:`${doneCount}/${totalSessions}`, color:"#6366f1", grad:"#6366f1,#a78bfa" },
              { label:"CODING",  pct:codingPct,  sub:`${codingDone}/${codingSessions}`, color:"#ec4899", grad:"#ec4899,#f472b6" },
            ].map(s => (
              <div key={s.label} style={{ textAlign:"right" }}>
                <div style={{ fontSize:7, color:"#3d4f6e", letterSpacing:"0.1em", marginBottom:2 }}>{s.label}</div>
                <div style={{ fontSize:26, fontWeight:900, color:s.color, lineHeight:1 }}>{s.pct}%</div>
                <div style={{ fontSize:8, color:"#3d4f6e", marginTop:1 }}>{s.sub}</div>
                <div style={{ marginTop:3, height:3, background:"#1a2235", borderRadius:2, width:82 }}>
                  <div style={{ height:"100%", width:`${s.pct}%`, background:`linear-gradient(90deg,${s.grad})`, borderRadius:2, transition:"width 0.4s" }} />
                </div>
              </div>
            ))}
            <button onClick={() => setShowReset(true)} style={{ fontSize:8, color:"#ef4444", background:"transparent", border:"1px solid #7f1d1d", borderRadius:4, padding:"4px 8px", cursor:"pointer", fontFamily:"monospace", marginTop:18, letterSpacing:"0.1em" }}>
              RESET
            </button>
          </div>
        </div>
      </div>

      {/* Info bar */}
      <div style={{ display:"flex", background:"#07090f", borderBottom:"1px solid #1a2235", overflowX:"auto", flexShrink:0 }}>
        {[
          { l:"📐 APTITUDE", d:"Foundation + Advanced · every day", c:"#60a5fa" },
          { l:"⚙ CODING",   d:"GitHub sheet · PYQs · EVERY DAY", c:"#ec4899" },
          { l:"ADV CODING ★",d:"DP · Greedy · Sorting · Recursion · D6", c:"#a78bfa" },
          { l:"NO NEGATIVE", d:"Attempt every question", c:"#34d399" },
          { l:"QUESTION LOCK",d:"Cannot revisit questions", c:"#fbbf24" },
          { l:"MAR 14–20",   d:"Sat → Fri · 7 days", c:"#94a3b8" },
        ].map((x, i) => (
          <div key={i} style={{ padding:"6px 14px", borderRight:"1px solid #1a2235", whiteSpace:"nowrap", flexShrink:0 }}>
            <div style={{ fontSize:7, fontWeight:800, color:x.c, letterSpacing:"0.14em" }}>{x.l}</div>
            <div style={{ fontSize:9, color:"#1e2d45", marginTop:1, fontFamily:"sans-serif" }}>{x.d}</div>
          </div>
        ))}
      </div>

      <div style={{ display:"flex", flex:1, minHeight:0 }}>
        {/* Day Sidebar */}
        <div style={{ width:170, flexShrink:0, background:"#07090f", borderRight:"1px solid #1a2235", overflowY:"auto", padding:"10px 0" }}>
          <div style={{ fontSize:7, letterSpacing:"0.22em", color:"#1a2235", padding:"0 11px 7px", fontWeight:800 }}>SELECT DAY</div>
          {days.map((d, i) => {
            const done      = d.sessions.filter((_,si) => completed[`${i}-${si}`]).length;
            const allDone   = done === d.sessions.length;
            const codDone   = d.sessions.filter((s,si) => s.coding && completed[`${i}-${si}`]).length;
            const codTotal  = d.sessions.filter(s => s.coding).length;
            const pct       = Math.round((done / d.sessions.length) * 100);
            return (
              <button key={i} onClick={() => setActiveDay(i)} style={{ display:"block", width:"100%", textAlign:"left", padding:"9px 11px", border:"none", cursor:"pointer", background:activeDay===i?"#0c1118":"transparent", borderLeft:activeDay===i?`3px solid ${d.tagColor}`:"3px solid transparent", transition:"all 0.15s" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:7, color:activeDay===i?d.tagColor:"#1a2235", letterSpacing:"0.12em", fontWeight:800 }}>DAY {d.day}</span>
                  {allDone?<span style={{ fontSize:9, color:"#34d399" }}>✓</span>:done>0?<span style={{ fontSize:7, color:"#3d4f6e" }}>{done}/{d.sessions.length}</span>:null}
                </div>
                <div style={{ fontSize:10, color:activeDay===i?"#e2e8f0":"#2d3d5a", marginTop:2, fontFamily:"sans-serif", fontWeight:activeDay===i?700:400 }}>{d.label}</div>
                <div style={{ display:"flex", gap:4, marginTop:2, alignItems:"center" }}>
                  <span style={{ fontSize:7, color:"#1a2235" }}>📐</span>
                  <span style={{ fontSize:7, color:codDone===codTotal&&codTotal>0?"#ec4899":"#2a1438", fontFamily:"sans-serif" }}>⚙{codDone}/{codTotal}</span>
                </div>
                {done>0&&(<div style={{ marginTop:4, height:2, background:"#1a2235", borderRadius:1 }}><div style={{ height:"100%", width:`${pct}%`, background:allDone?"#34d399":d.tagColor, borderRadius:1, transition:"width 0.3s" }} /></div>)}
              </button>
            );
          })}
        </div>

        {/* Main */}
        <div style={{ flex:1, overflowY:"auto", padding:"14px 18px" }}>
          {/* Day header */}
          <div style={{ marginBottom:12 }}>
            <div style={{ display:"flex", gap:7, alignItems:"center", marginBottom:5, flexWrap:"wrap" }}>
              <span style={{ fontSize:7, fontWeight:800, letterSpacing:"0.2em", background:day.tagColor+"1a", color:day.tagColor, padding:"3px 8px", borderRadius:3 }}>{day.tag}</span>
              <span style={{ fontSize:8, color:"#2d3d5a" }}>DAY {day.day} · {day.label} · {day.hours}</span>
            </div>
            <h2 style={{ margin:"0 0 8px", fontSize:"clamp(12px,2vw,17px)", fontWeight:800, color:"#f1f5f9" }}>{day.theme}</h2>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:8 }}>
              {[
                { icon:"📐", label:"APTITUDE", text:day.aptitudeFocus, bg:"#0f2040", border:"#1e4080", col:"#60a5fa" },
                { icon:"⚙", label:"CODING",   text:day.codingFocus,   bg:"#180830", border:"#4c1d95", col:"#ec4899" },
              ].map(b => (
                <div key={b.label} style={{ background:b.bg, border:`1px solid ${b.border}`, borderRadius:5, padding:"5px 10px", flex:1, minWidth:160 }}>
                  <div style={{ fontSize:7, color:b.col, letterSpacing:"0.14em", fontWeight:800, marginBottom:2 }}>{b.icon} {b.label}</div>
                  <div style={{ fontSize:9, color:"#4d6080", fontFamily:"sans-serif", lineHeight:1.5 }}>{b.text}</div>
                </div>
              ))}
            </div>
            {/* Filter */}
            <div style={{ display:"flex", gap:5 }}>
              {["all","aptitude","coding"].map(v=>(
                <button key={v} onClick={()=>setView(v)} style={{ fontSize:7, padding:"3px 10px", borderRadius:4, border:`1px solid ${view===v?"#6366f1":"#1a2235"}`, background:view===v?"#14143a":"transparent", color:view===v?"#a78bfa":"#2d3d5a", cursor:"pointer", fontFamily:"monospace", letterSpacing:"0.1em", textTransform:"uppercase" }}>
                  {v==="all"?"All":v==="aptitude"?"📐 Aptitude":"⚙ Coding"}
                </button>
              ))}
            </div>
          </div>

          {/* Sessions */}
          <div style={{ display:"flex", flexDirection:"column", gap:7, marginBottom:12 }}>
            {filteredSessions.map(session => {
              const si  = day.sessions.indexOf(session);
              const key = `${activeDay}-${si}`;
              const done = !!completed[key];
              const ts  = typeStyle[session.type] || typeStyle.Aptitude;
              const ds  = session.diff ? diffBadge[session.diff] : null;
              const exp = !!expanded[key];
              return (
                <div key={si} style={{ background:done?(session.coding?"#07100a":"#070d10"):(session.coding?"#0b0918":"#090e1c"), border:`1px solid ${done?(session.coding?"#162a1a":"#0f1e2a"):(session.coding?"#2a1040":"#1a2235")}`, borderRadius:7, padding:"11px 13px", opacity:done?0.55:1, transition:"all 0.2s" }}>
                  <div style={{ display:"flex", gap:9, alignItems:"flex-start" }}>
                    <button onClick={()=>toggleSession(activeDay,si)} style={{ width:18, height:18, borderRadius:"50%", flexShrink:0, marginTop:3, border:`2px solid ${done?"#34d399":"#2d3d5a"}`, background:done?"#34d399":"transparent", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:done?"#07090f":"transparent", transition:"all 0.2s" }}>✓</button>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", gap:5, alignItems:"center", marginBottom:4, flexWrap:"wrap" }}>
                        <span style={{ fontSize:8, fontFamily:"monospace", color:"#2d3d5a" }}>{session.time}</span>
                        <span style={{ fontSize:7, fontWeight:800, letterSpacing:"0.12em", background:ts.bg, color:ts.text, border:`1px solid ${ts.border}`, padding:"1px 5px", borderRadius:3 }}>{ts.icon} {session.type.toUpperCase()}</span>
                        {ds&&<span style={{ fontSize:7, fontWeight:800, letterSpacing:"0.1em", background:ds.bg, color:ds.text, border:`1px solid ${ds.border}`, padding:"1px 5px", borderRadius:3 }}>{session.diff}</span>}
                      </div>
                      <div style={{ fontSize:12, fontWeight:700, color:done?"#3d4f6e":"#f1f5f9", marginBottom:4, fontFamily:"sans-serif", textDecoration:done?"line-through":"none" }}>{session.title}</div>
                      <div style={{ fontSize:11, color:"#3d5070", fontFamily:"sans-serif", lineHeight:1.65 }}>{session.desc}</div>
                      {session.problems&&(
                        <div style={{ marginTop:7 }}>
                          <button onClick={()=>toggleProblems(activeDay,si)} style={{ fontSize:7, color:"#9d6eef", background:"transparent", border:"1px solid #3b0764", borderRadius:3, padding:"2px 9px", cursor:"pointer", fontFamily:"monospace", letterSpacing:"0.1em" }}>
                            {exp?"▲ HIDE":"▼ SHOW"} {session.problems.length} PROBLEMS →
                          </button>
                          {exp&&(
                            <div style={{ marginTop:5, display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:3 }}>
                              {session.problems.map((p,pi)=>{
                                const isPyq = p.name.startsWith("🌟");
                                const isGfg = p.url.includes("geeksforgeeks");
                                return (
                                  <a key={pi} href={p.url} target="_blank" rel="noopener noreferrer" style={{ display:"flex", alignItems:"center", gap:5, padding:"4px 8px", background:isPyq?"#18071e":isGfg?"#071810":"#0c0716", border:`1px solid ${isPyq?"#6b1050":isGfg?"#134523":"#2e0656"}`, borderRadius:4, color:isPyq?"#f472b6":isGfg?"#4ade80":"#b07ef4", fontSize:10, fontFamily:"sans-serif", textDecoration:"none", fontWeight:isPyq?700:400 }}>
                                    <span style={{ fontSize:7, flexShrink:0, color:isPyq?"#be185d":isGfg?"#16a34a":"#6b21a8" }}>→</span>
                                    {p.name}
                                  </a>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Resources */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7, marginBottom:8 }}>
            {["apt","code"].map(t => (
              <div key={t} style={{ background:t==="apt"?"#091428":"#110728", border:`1px solid ${t==="apt"?"#1a3a6e":"#3b1068"}`, borderRadius:6, padding:"10px 12px" }}>
                <div style={{ fontSize:7, letterSpacing:"0.18em", color:t==="apt"?"#3b82f6":"#a78bfa", fontWeight:800, marginBottom:7 }}>{t==="apt"?"📐 APTITUDE RESOURCES":"⚙ CODING RESOURCES"}</div>
                <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                  {day.resources.filter(r=>r.type===t).map((r,i)=>(
                    <a key={i} href={r.url} target="_blank" rel="noopener noreferrer" style={{ display:"flex", alignItems:"center", gap:5, color:r.name.startsWith("🔗")?"#f472b6":t==="apt"?"#60a5fa":"#c084fc", fontSize:10, fontFamily:"sans-serif", textDecoration:"none" }}>
                      <span style={{ fontSize:7, color:t==="apt"?"#1e4080":"#5b21b6" }}>→</span>{r.name}
                    </a>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {/* Notes */}
          <div style={{ background:"#090c18", border:"1px solid #1a3050", borderRadius:6, padding:"10px 12px", marginBottom:8 }}>
            <div style={{ fontSize:7, letterSpacing:"0.18em", color:"#475569", fontWeight:800, marginBottom:6 }}>📝 MY NOTES — DAY {day.day} (auto-saved)</div>
            <textarea
              value={noteText}
              onChange={handleNoteChange}
              placeholder="Jot down concepts, mistakes, formulas to remember..."
              style={{ width:"100%", background:"#050810", border:"1px solid #1a2235", borderRadius:4, color:"#94a3b8", fontSize:11, fontFamily:"sans-serif", padding:"8px 10px", resize:"vertical", minHeight:64, outline:"none", lineHeight:1.6 }}
            />
          </div>

          {/* Tip */}
          <div style={{ background:"#0e0a02", border:"1px solid #6b3a08", borderRadius:6, padding:"10px 12px", display:"flex", gap:8, alignItems:"flex-start" }}>
            <span style={{ fontSize:13, flexShrink:0 }}>💡</span>
            <div>
              <div style={{ fontSize:7, letterSpacing:"0.18em", color:"#d97706", fontWeight:800, marginBottom:3 }}>PRO TIP</div>
              <div style={{ fontSize:11, color:"#92400e", fontFamily:"sans-serif", lineHeight:1.7 }}>{day.tip}</div>
            </div>
          </div>
        </div>

        {/* Right panel */}
        <div style={{ width:186, flexShrink:0, background:"#07090f", borderLeft:"1px solid #1a2235", overflowY:"auto", padding:"10px" }}>
          <div style={{ fontSize:7, letterSpacing:"0.2em", color:"#1a2235", fontWeight:800, marginBottom:7 }}>WEEK AT A GLANCE</div>
          {days.map((d,i) => {
            const done     = d.sessions.filter((_,si)=>completed[`${i}-${si}`]).length;
            const codDone  = d.sessions.filter((s,si)=>s.coding&&completed[`${i}-${si}`]).length;
            const codTotal = d.sessions.filter(s=>s.coding).length;
            const pct      = Math.round((done/d.sessions.length)*100);
            const isToday  = i === activeDay;
            return (
              <div key={i} onClick={()=>setActiveDay(i)} style={{ cursor:"pointer", padding:"7px 7px", borderRadius:5, marginBottom:3, background:isToday?"#0c1118":"transparent", border:isToday?`1px solid ${d.tagColor}44`:"1px solid transparent" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                  <span style={{ fontSize:8, color:isToday?d.tagColor:"#1a2235", fontWeight:800 }}>D{d.day} {d.label.slice(0,3).toUpperCase()}</span>
                  <span style={{ fontSize:7, color:pct===100?"#34d399":"#2d3d5a" }}>{pct===100?"✓":pct>0?`${pct}%`:""}</span>
                </div>
                <div style={{ height:2, background:"#111827", borderRadius:1, marginBottom:2 }}>
                  <div style={{ height:"100%", width:`${pct}%`, background:pct===100?"#34d399":d.tagColor, borderRadius:1, transition:"width 0.3s" }} />
                </div>
                <div style={{ display:"flex", justifyContent:"space-between" }}>
                  <span style={{ fontSize:7, color:"#1a2235", fontFamily:"sans-serif" }}>{d.label.slice(4)}</span>
                  <span style={{ fontSize:7, color:codDone===codTotal&&codTotal>0?"#ec4899":"#2a1438" }}>⚙{codDone}/{codTotal}</span>
                </div>
              </div>
            );
          })}

          {/* Coding roadmap */}
          <div style={{ marginTop:10, background:"#080a14", borderRadius:6, border:"1px solid #1a2235", padding:"8px 9px" }}>
            <div style={{ fontSize:7, color:"#ec4899", letterSpacing:"0.18em", fontWeight:800, marginBottom:6 }}>⚙ CODING ROADMAP</div>
            {[
              { d:"D1 SAT", t:"Numbers + Base Conversion", c:"#F59E0B" },
              { d:"D2 SUN", t:"Arrays — all basics", c:"#8B5CF6" },
              { d:"D3 MON", t:"Strings + PYQs", c:"#10B981" },
              { d:"D4 TUE", t:"Sorting (5 algos) + Adv Arrays", c:"#F97316" },
              { d:"D5 WED", t:"Recursion + Adv Strings + DP Intro", c:"#EC4899" },
              { d:"D6 THU", t:"DP · Greedy · Search · Matrices ★", c:"#6366F1" },
              { d:"D7 FRI", t:"Warm-up + PYQ Revision", c:"#06B6D4" },
            ].map((x,i)=>(
              <div key={i} style={{ display:"flex", gap:5, alignItems:"flex-start", marginBottom:5 }}>
                <span style={{ fontSize:7, color:x.c, fontWeight:800, flexShrink:0, minWidth:42 }}>{x.d}</span>
                <span style={{ fontSize:9, color:"#2d3d5a", fontFamily:"sans-serif", lineHeight:1.4 }}>{x.t}</span>
              </div>
            ))}
          </div>

          {/* GitHub link */}
          <a href="https://github.com/karthikreddy-7/TCS-NQT-CODING-SHEET" target="_blank" rel="noopener noreferrer" style={{ display:"block", marginTop:8, padding:"8px", background:"#110720", border:"1px solid #4c1d95", borderRadius:6, textDecoration:"none", textAlign:"center" }}>
            <div style={{ fontSize:12, marginBottom:2 }}>⚙</div>
            <div style={{ fontSize:7, color:"#c084fc", fontWeight:800, letterSpacing:"0.1em" }}>GITHUB CODING SHEET</div>
            <div style={{ fontSize:7, color:"#5b21b6", marginTop:1, fontFamily:"sans-serif" }}>karthikreddy-7 · 428 ★</div>
          </a>

          {/* Exam facts */}
          <div style={{ marginTop:8, background:"#08111e", borderRadius:6, border:"1px solid #1a3050", padding:"8px 9px" }}>
            <div style={{ fontSize:7, color:"#3b82f6", letterSpacing:"0.16em", fontWeight:800, marginBottom:5 }}>EXAM FACTS</div>
            {[["Foundation","75 min · 65 Qs"],["Advanced","115 min · ~27 Qs"],["Coding","3 Problems"],["Negative","None ✓"],["Revisit Qs","No ✗"],["Valid for","2 years"]].map(([k,v])=>(
              <div key={k} style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                <span style={{ fontSize:7, color:"#1a2235" }}>{k}</span>
                <span style={{ fontSize:7, color:"#2d3d5a", textAlign:"right" }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
